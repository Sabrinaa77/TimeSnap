{% extends "layouts/customer/default.html" %}

{% block main %}
<div class="pt-16 px-4">
  <h1 class="text-2xl font-semibold mb-4 text-center mt-8">恭喜你成功預約！</h1>
  <div class="max-w-md mx-auto border border-gray-300 rounded-md p-6 shadow-md bg-white">
    <h3>姓名：{{ reserve.name }}</h3>
    <h3>手機號碼：{{ reserve.telephone }}</h3>
    <h3>預約日期：{{ reserve.reserve_date }}</h3>
    <h3>預約時間：{{ reserve.reserve_time }}</h3>
  </div>
</div>

{% endblock %}
