{% extends 'layouts/customer/default.html' %}
{% block main %}

<!-- ✅ 騰出空間給 navbar，否則會被遮住 -->
<div class="pt-16 px-4">
  <h1 class="text-2xl font-semibold mb-4 text-center mt-8">歡迎來到 TimeSnap 預約平台</h1>

  <form method="post" action="{% url 'reserve:home' %}" class="border border-gray-300 rounded-md p-4 shadow-sm bg-white max-w-md mx-auto">
  {% csrf_token %}

  <label class="flex items-center mb-2 space-x-4">
    <span class="w-24">姓名：</span>
    <input type="text" name="name" value="{{ reserve.name }}" class="input input-bordered flex-1" required />
  </label>

  <label class="flex items-center mb-2 space-x-4">
    <span class="w-24">手機號碼：</span>
    <input type="tel" name="telephone" value="{{ reserve.telephone }}" class="input input-bordered flex-1" required />
  </label>

  <label class="flex items-center mb-2 space-x-4">
    <span class="w-24">預約日期：</span>
    <input type="date" name="reserve_date" value="{{ reserve.date }}" class="input input-bordered flex-1" required />
  </label>

  <label class="flex items-center mb-4 space-x-4">
    <span class="w-24">預約時間：</span>
    <input type="time" name="reserve_time" value="{{ reserve.time }}" class="input input-bordered flex-1" required />
  </label>

  <div>
    <input type="submit" value="預約" class="btn btn-primary w-full" />
  </div>
  </form>
</div>


{% endblock %}
