{% extends 'layouts/customer/default.html' %}

{% block main %}
<div class="pt-20 px-4">
  <div class="max-w-3xl mx-auto">
    <div id="calendar"></div>
  </div>
</div>

<!-- FullCalendar 樣式與功能 -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'zh-tw',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      events: [
        { title: 'Alice 預約', start: '2025-06-28T14:00:00' },
        { title: 'Bob 預約', start: '2025-06-29T09:30:00' },
        { title: 'Carol 預約', start: '2025-07-02T10:00:00' }
      ],
      eventColor: '#378006',
      eventClick: function(info) {
        alert('預約者：' + info.event.title + '\n時間：' + info.event.start.toLocaleString());
      }
    });

    calendar.render();
  });
</script>
{% endblock %}
