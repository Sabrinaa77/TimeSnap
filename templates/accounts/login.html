<!-- accounts/templates/accounts/login.html -->
<!DOCTYPE html>
<html>
<head>
  <title>登入</title>
</head>
<body>
  <h2>會員登入</h2>
  <form method="post" action="/accounts/logout/?next=/">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">登入</button>
    <a href="/accounts/register/" class="btn btn-primary">註冊帳號</a>
  </form>
</body>
</html>
